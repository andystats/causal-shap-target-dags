project:
  type: website
  output-dir: _site

# The current pages use prose and pre-built assets, so renders execute no analysis
# code. Freeze remains enabled as a safeguard for any future executable chunks.
execute:
  freeze: true

website:
  title: "Target DAGs"
  description: "Why predictive attribution points to the last node—and how intervention propagation moves action upstream."
  site-url: https://andystats.github.io/causal-shap-target-dags/
  page-navigation: true
  navbar:
    background: light
    left:
      - text: "The demonstration"
        href: index.qmd
      - text: "Why it happens"
        href: why-it-happens.qmd
      - text: "Evidence"
        href: evidence.qmd
      - text: "Research lineage"
        href: research-lineage.qmd
      - text: "Reproduce"
        href: reproducibility.qmd
      - text: "Lab notebook"
        menu:
          - text: "Six-rung workflow"
            href: workflow/index.qmd
          - text: "Interactive app"
            href: app.qmd
          - text: "DAG vocabulary"
            href: cheatsheets/dag-vocabulary.qmd
          - text: "Discovery algorithms"
            href: cheatsheets/discovery-algorithms.qmd
          - text: "SHAP variants & equations"
            href: cheatsheets/shap-variants.qmd
          - text: "Estimands & validation"
            href: cheatsheets/estimands-validation.qmd
          - text: "Glossary"
            href: glossary.qmd
    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/andystats/causal-shap-target-dags

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    fig-cap-location: bottom
    smooth-scroll: true
    grid:
      body-width: 860px
      sidebar-width: 260px
      margin-width: 260px
