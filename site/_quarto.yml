project:
  type: website
  output-dir: _site
  render:
    - index.qmd

execute:
  freeze: true

website:
  title: "Target DAGs"
  description: "An ACIC Causal SHAP application: move from predictive credit to defensible intervention targets."
  site-url: https://andystats.github.io/causal-shap-target-dags/
  favicon: favicon.svg
  search: false
  page-navigation: false
  navbar:
    background: light
    collapse: true
    left:
      - text: "Motivation"
        href: index.qmd#motivation
      - text: "Hierarchy"
        href: index.qmd#hierarchy
      - text: "Demonstration"
        href: index.qmd#demonstration
      - text: "Status"
        href: index.qmd#status
    right:
      - icon: github
        aria-label: "GitHub repository"
        href: https://github.com/andystats/causal-shap-target-dags
  page-footer:
    left: "ACIC 2026 Causal SHAP → Target DAGs"
    right:
      - text: "Methods, evidence, and sources"
        href: https://github.com/andystats/causal-shap-target-dags/tree/main/docs

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: false
    anchor-sections: false
    smooth-scroll: true
    grid:
      body-width: 1180px
      gutter-width: 1.5rem
