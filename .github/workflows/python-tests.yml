name: Python tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r app/requirements.txt
      - name: Compile and test
        working-directory: app
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v
          python -c "from pathlib import Path; from causal_shap.bundles import BundleRepository; errors=BundleRepository(Path('..'), Path('bundles/manifest.json')).validate(); assert not errors, errors"
