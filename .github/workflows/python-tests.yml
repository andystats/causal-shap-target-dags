name: Python tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check contributor metadata
        shell: bash
        run: |
          if git log --format='%B' | grep -Eiq '^Co-authored-by:.*(Claude|Anthropic)'; then
            echo 'Automated assistants must not be listed as commit co-authors.' >&2
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with discovery extra
        run: python -m pip install -e ".[discovery]"
      - name: Compile and test
        working-directory: app
        run: |
          python -m compileall -q causal_shap stages tests app.py
          python -m unittest discover -s tests -v
      - name: Validate bundles and frozen output
        working-directory: app
        run: python -m causal_shap.build validate
      - name: Assert bundle manifest resolves
        working-directory: app
        run: python -c "from pathlib import Path; from causal_shap.bundles import BundleRepository; errors=BundleRepository(Path('.'), Path('bundles/manifest.json')).validate(); assert not errors, errors"
